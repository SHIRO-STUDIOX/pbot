version: "3.8"

services:
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platibot_app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Mount log directory to persist logs on host
      - ./logs:/app/logs
      # Mount data directory so you can edit delivery templates without rebuilding Docker image
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1

  telegram-proxy:
    profiles:
      - proxy
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platibot_proxy
    restart: unless-stopped
    command: ["python", "relay/local_proxy.py"]
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PROXY_PORT=8080
      - PROXY_HOST=0.0.0.0
    ports:
      - "8080:8080"
